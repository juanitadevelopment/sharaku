# JitPack build configuration for the multi-module `sharaku` repo.
# JitPack runs Gradle on this JDK; the build's Java 21 toolchain is then
# auto-provisioned by the foojay resolver configured in settings.gradle.kts.
#
# publishToMavenLocal publishes every subproject's Maven publication, so both
# modules are resolvable per tag as:
#   com.github.juanitadevelopment.sharaku:shazo:<tag>
#   com.github.juanitadevelopment.sharaku:backbone:<tag>
jdk:
  - openjdk21
install:
  - ./gradlew publishToMavenLocal -x test --no-daemon
